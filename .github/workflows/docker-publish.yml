name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "发版版本号（如 v1.2.0），与镜像 tag 及前端展示一致"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set GHCR image name (lowercase)
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${owner_lc}/${repo_lc}" >> "$GITHUB_ENV"

      - name: Set build version and Docker tags
        run: |
          IMAGE="${{ env.IMAGE_NAME }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VER="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.release_tag }}"
          else
            short=$(echo "${{ github.sha }}" | cut -c1-7)
            VER="${{ github.run_number }}-${short}"
          fi
          echo "APP_VERSION=$VER" >> "$GITHUB_ENV"
          {
            echo "DOCKER_TAGS<<EOF"
            if [ "${{ github.ref_type }}" = "tag" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "${IMAGE}:${VER}"
              echo "${IMAGE}:latest"
            else
              echo "${IMAGE}:latest"
              echo "${IMAGE}:main"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          tags: ${{ env.DOCKER_TAGS }}
