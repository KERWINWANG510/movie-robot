services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-请更换为长随机串}
      DATABASE_URL: sqlite+aiosqlite:///./data/app.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      SESSION_HTTPS_ONLY: ${SESSION_HTTPS_ONLY:-false}
    volumes:
      - movie_robot_data:/app/data
      # 将 NAS 共享目录挂载到容器内路径（示例），并在 Web「系统配置」中填写相同的挂载根路径：
      # - /volume1/Media:/data:rw

volumes:
  movie_robot_data:
